name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# A fork PR's workflow_run gets a read-only, secret-less token by default;
# this pins that down explicitly rather than relying on the repo default.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: securityreview
          POSTGRES_PASSWORD: securityreview
          POSTGRES_DB: securityreview_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U securityreview"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://securityreview:securityreview@localhost:5432/securityreview_test
      REDIS_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.6"
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:schema:load

      - name: Run test suite
        run: bundle exec rspec

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.6"
          bundler-cache: true
      - name: Rubocop
        run: bundle exec rubocop

  brakeman:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.6"
          bundler-cache: true
      # Static analysis for Rails-specific vulnerability classes (SQLi,
      # mass assignment, unsafe redirects, etc.) — fails the build on any
      # finding at or above medium confidence.
      - name: Brakeman
        run: bundle exec brakeman --no-pager -w2 --exit-on-warn

  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.6"
          bundler-cache: true
      - name: bundler-audit (known CVEs in Gemfile.lock)
        run: |
          bundle exec bundler-audit update
          bundle exec bundler-audit check

  terraform-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive
      - name: terraform validate
        run: |
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform validate
