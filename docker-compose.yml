# Runs the same image that ships to production (see Dockerfile) against
# local Postgres/Redis, for smoke-testing a build — not a hot-reloading
# dev environment. `bin/rails server` outside Docker remains the fast
# inner dev loop.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: securityreview
      POSTGRES_PASSWORD: securityreview
      POSTGRES_DB: securityreview_development
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securityreview"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # DATABASE_URL/REDIS_URL are set here, not left to .env: inside these
  # containers "db"/"redis" (the service names below) are the correct
  # hostnames, not "localhost" — which is what .env.example holds for
  # running `bin/rails server` directly on the host. An `environment:`
  # entry overrides the same key from `env_file`, so this wins regardless
  # of what's in the user's .env.
  web:
    build: .
    env_file: .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://securityreview:securityreview@db:5432/securityreview_development
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  sidekiq:
    build: .
    env_file: .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://securityreview:securityreview@db:5432/securityreview_development
      REDIS_URL: redis://redis:6379/0
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_data:
