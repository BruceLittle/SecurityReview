# Non-secret configuration only. Anything sensitive (DB URL, AWS keys,
# webhook signing secrets, encryption keys) lives in a real Secret created
# out-of-band by the deploy pipeline / external-secrets operator — see
# secret.yaml.example, which is a template, not a real manifest, and is
# never applied as-is.
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-review-config
  namespace: security-review
data:
  RAILS_ENV: "production"
  RAILS_LOG_LEVEL: "info"
  RAILS_SERVE_STATIC_FILES: "false"
  AWS_REGION: "us-east-1"
  ALLOWED_HOSTS: "app.example.com"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"
  TRUSTED_PROXY_CIDRS: "10.0.0.0/8"
