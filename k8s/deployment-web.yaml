apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-review-web
  namespace: security-review
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-review-web
  template:
    metadata:
      labels:
        app: security-review-web
    spec:
      serviceAccountName: security-review-app
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: security-review-web:latest # replaced by the deploy pipeline with a digest-pinned tag
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: security-review-config
            - secretRef:
                name: security-review-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /app/tmp
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
