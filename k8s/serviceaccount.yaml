# Bound to the least-privilege IAM role provisioned in terraform/iam.tf
# via IRSA — pods using this service account get S3/KMS access to exactly
# the attachments bucket, nothing else, with no static AWS credential
# anywhere in the cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-review-app
  namespace: security-review
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/security-review-app"
